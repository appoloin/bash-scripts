[dosbox]
machine  = svga_s3
vmemsize = 4

[sdl]
fullscreen = on
pause_when_inactive = yes

[render]
viewport = fit
integer_scaling = off

[cpu]
cpu_cycles = 25000
cpu_cycles_protected = auto
cpu_throttle = on
cputype = 486

[sblaster]
sbtype = sb16

[gus]
gus = false

[midi]
mpu401     = intelligent
mididevice = fluidsynth


[autoexec]
mount C -t dir "./TitAdvOT" 
imgmount D -t iso "./TitAdvOT/cd/CD1.cue" "./TitAdvOT/cd/CD2.cue"



SET PATH=%PATH%;C:\WINDOWS;C:\DOS;Y:\DOS
SET TEMP=C:\WINDOWS\TEMP

cls
C:
echo.
echo This game spans 2 discs.  Press ctrl-F4 to switch when prompted.
echo.
pause 
cls
WIN c:\titanic\ti
exit
