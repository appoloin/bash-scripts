[dosbox]
machine  = svga_s3
vmemsize = 4

[sdl]
fullscreen = on
pause_when_inactive = yes

[render]
viewport = fit
integer_scaling = off

[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cpu_throttle = on
cputype = pentium

[sblaster]
sbtype = sb16

[gus]
gus = true

[midi]
mpu401     = intelligent
mididevice = fluidsynth


[autoexec]
mount C -t dir "~/Games/ROMs/windows3x/ace-ventura.conf/drives/c" 
imgmount D -t iso "~/Games/ROMs/windows3x/ace-ventura.conf/drives/d/GAME.iso"

SET PATH=%PATH%;C:\WINDOWS;C:\DOS;Y:\DOS
SET TEMP=C:\WINDOWS\TEMP

ECHO OFF

C:
win D:\setup

exit
