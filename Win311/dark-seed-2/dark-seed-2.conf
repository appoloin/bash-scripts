[dosbox]
machine  = svga_s3
vmemsize = 4

[sdl]
fullscreen = on
pause_when_inactive = yes

[render]
viewport = fit
integer_scaling = off

[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cpu_throttle = on
cputype = 486

[sblaster]
sbtype = sb16

[gus]
gus = false

[midi]
mpu401     = intelligent
mididevice = fluidsynth


[autoexec]
mount D -t cdrom "./DSeed2/cd/cd.cue"
mount C -t dir "./DSeed2"

SET PATH=%PATH%;C:\;C:\WINDOWS;C:\DOS;Y:\DOS
SET TEMP=C:\WINDOWS\TEMP

C:
cd darkseed
cls 
win runexit dark0001
exit 
