[dosbox]
machine  = svga_s3
vmemsize = 4

[sdl]
fullscreen = on
pause_when_inactive = yes

[render]
aspect = stretch
viewport = fit
integer_scaling = off

[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cpu_throttle = on
cputype = pentium

[sblaster]
sbtype = sb16

[gus]
gus = true

[midi]
mpu401     = intelligent
mididevice = fluidsynth


[autoexec]
mount C -t dir "./9 - The Last Resort/HDD" 
imgmount D -t cdrom "./9 - The Last Resort/CD/9LR.cue" 

SET PATH=%PATH%;C:\WINDOWS;C:\;
SET TEMP=C:\WINDOWS\TEMP

ECHO OFF

win c:\runexit\runexit C:\NINE\NINE_31.EXE
exit