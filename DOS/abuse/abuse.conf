[midi]
mididevice = mt32


[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on


[sdl]   
fullresolution=desktop
windowresolution=original
fullscreen=true
output=opengl

[render]
viewport = fit
integer_scaling = off

[autoexec]
mount C -t dir "./Abuse/ABUSE" 
mount D -t cdrom "./Abuse/cd"


C:
run
exit