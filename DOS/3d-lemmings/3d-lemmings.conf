[mouse]
mouse_capture = onstart   
mouse_middle_release=true   
mouse_sensitivity= 90

[gus]
gus= true
ultradir = C:\ULTRASND


[sdl]
fullresolution=desktop
windowresolution=original
fullscreen=true
output=opengl

[render]
aspect=true
scaler=normal2x

[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on


[autoexec]
mount C -t dir "~/Games/ROMs/dos/3d-lemmings.conf/drives" 
imgmount D -t cdrom "~/Games/ROMs/dos/3d-lemmings.conf/drives/CD/Lemmings 3D.cue" 

C:
RUN
exit