[midi]
mididevice = mt32


[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on

[sblaster]
sbtype=sb16
sbbase=220
irq=3

[mouse]
mouse_capture = onstart   
mouse_middle_release=true   
mouse_sensitivity= 50


[sdl]   
fullresolution=desktop
windowresolution=original
fullscreen=true
output=opengl

[render]
aspect=true
scaler=normal2x


[autoexec]
mount C -t dir "./" 
C:
cls
AUTOTYPE -w 1 1 4 2 2
count
exit