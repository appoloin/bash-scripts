[midi]
mididevice = mt32

[cpu]
cpu_cycles = 25000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on


[sdl]
fullscreen=true
output=opengl


[render]
viewport = fit
integer_scaling = off


[autoexec]
mount C  -t dir "./KCD"
imgmount D -t cdrom "./KCD/cd/B.A.T.2-The.Koshan.Conspiracy.Deluxe.Edition-TransferCrew.cue"
C:

cd KCD

KCD.bat

exit