[midi]
mididevice = mt32


[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on


[sdl]   
fullresolution=desktop
windowresolution=original
fullscreen=true
output=opengl

[render]
aspect=true
scaler=normal2x

[gus]
gus=true

[autoexec]
mount C -t dir "./comconra"

ECHO OFF 
C:
GOTO menu

:menu
@echo off
CLS

echo.
echo Press 1 for Command & Conquer: Red Alert Allied Campaign
echo Press 2 for Command & Conquer: Red Alert Soviet Campaign
echo Press 3 for Command & Conquer: Red Alert Aftermath
echo Press 4 for Command & Conquer: Red Alert Counter Strike
echo Press 5 for Network Multiplayer
echo Press 6 to Quit
echo.
echo This game contains 4 discs. The choice above loads the required
echo disc for that campaign. If you attempt to start a different
echo campaign than the one you select here, you will have to hit
echo ctrl-f4 to switch through the mounted CD's until you find the
echo right one.
echo.
echo To play the hidden campaign, choose Counterstrike and hold
echo SHIFT while clicking on the speaker on the main menu.
echo.
choice /C:123456 /N Please Choose:

if errorlevel = 6 goto quit
if errorlevel = 5 goto network
if errorlevel = 4 goto CS
if errorlevel = 3 goto AM
if errorlevel = 2 goto RAS
if errorlevel = 1 goto RAA

:RAA
@imgmount d -t cdrom "./comconra/cd/Red Alert CD1.iso" "./comconra/cd/Red Alert CD2.iso" "./comconra/cd/Red Alert Counterstrike CD3.cue" "./comconra/cd/Red Alert Aftermath CD4.cue" 
cd redalert
cls
@ra
goto quit

:RAS
@imgmount d -t cdrom "./comconra/cd/Red Alert CD2.iso" "./comconra/cd/Red Alert CD1.iso" "./comconra/cd/Red Alert Counterstrike CD3.cue" "./comconra/cd/Red Alert Aftermath CD4.cue"
cd redalert
cls
@ra
goto quit

:AM
@imgmount d -t cdrom "./comconra/cd/Red Alert Aftermath CD4.cue" "./comconra/cd/Red Alert CD1.iso" "./comconra/cd/Red Alert CD2.iso" "./comconra/cd/Red Alert Counterstrike CD3.cue" 
cd redalert
cls
@ra
goto quit

:CS
@imgmount d -t cdrom "./comconra/cd/Red Alert Counterstrike CD3.cue" "./comconra/cd/Red Alert CD1.iso" "./comconra/cd/Red Alert CD2.iso" "./comconra/cd/Red Alert Aftermath CD4.cue" 
cd redalert
cls
@ra
goto quit

:network
@imgmount d -t cdrom "./comconra/cd/Red Alert Aftermath CD4.cue"
cls
network

:quit



