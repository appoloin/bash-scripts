[cpu]
cpu_cycles = 25000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on

[midi]
mididevice = mt32

[sdl]
fullscreen=true
output=opengl

[render]
viewport = fit
integer_scaling = off

[autoexec]

mount C -t dir "./" 
            
cls 
ECHO OFF
goto launcher

:launcher
cls 
ECHO  -------------------------------------------  
ECHO                 Bioforge
ECHO  -------------------------------------------  
ECHO   1) Play        
ECHO   2) Setup                                
ECHO  -------------------------------------------  
ECHO   3) Exit Program                             
ECHO  -------------------------------------------  
choice /c1234 /s Which program do you want to run? [1-3]: /n 
if errorlevel 3 goto exit
if errorlevel 2 goto setup
if errorlevel 1 goto game


:game
cls
c:
cd Bioforge
BIOFORGE.EXE
goto exit


:setup
cls
c:
cd Bioforge
INSTALL.EXE
goto launcher


:exit        
exit