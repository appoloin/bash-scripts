[midi]
mididevice = mt32

[cpu]
cpu_cycles = 25000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on

[sdl]
fullscreen=true
output=opengl

[render]
viewport = fit
integer_scaling = off


[autoexec]

mount C -t dir "./cannfod2" 
imgmount D -t cdrom "./cannfod2/cd/CF2.cue" 

C:

CANNON

exit
        
            

