[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on


[sdl]
fullscreen=true
output=opengl


[render]
viewport = fit
integer_scaling = off

AlienTri
[autoexec]
mount C -t dir "./arktime" 
imgmount D -t cdrom "./arktime/cd/arkoftime.cue" 

ECHO OFF
cls 
C:
CD AOT 
AOT

exit