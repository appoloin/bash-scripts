[midi]
mididevice = mt32

[gus]
gus= true
ultradir = C:\ULTRASND


[cpu]
cpu_cycles = 25000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on

[autoexec]
mount C "./" -t dir

cls 
ECHO OFF
goto launcher

:launcher
cls 
ECHO  -------------------------------------------  
ECHO             Battle Chess 4000
ECHO  -------------------------------------------  
ECHO   1) Play Battle Chess 4000  
ECHO   2) Setup Battle Chess 4000  
ECHO  -------------------------------------------  
ECHO   3) Exit Program                             
ECHO  -------------------------------------------  
choice /c123 /s Which program do you want to run? [1-3]: /n 

if errorlevel 3 goto exit
if errorlevel 2 goto setup4000
if errorlevel 1 goto battle4000



:battle4000
cls
C:
cd Battle4
BC4000.EXE
goto exit



:setup4000
cls
C:
cd Battle4
setup
goto launcher


