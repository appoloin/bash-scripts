[midi]
mididevice = mt32


[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on


[sdl]   
fullresolution=desktop
windowresolution=original
fullscreen=true
output=opengl

[render]
aspect=true
scaler=normal2x

[gus]
gus=true

[autoexec]
mount C -t dir "./"
imgmount d  -t cdrom "./xanth\cd\Companions of Xanth.cue"
c:
cls
cd xanth
call run
exit