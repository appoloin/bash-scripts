[midi]
mididevice = mt32


[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on


[sdl]   
fullresolution=desktop
windowresolution=original
fullscreen=true
output=opengl

[render]
viewport = fit
integer_scaling = off

[autoexec]
mount c -t dir "./Darkseed"
imgmount d -t cdrom "./Darkseed/cd/darkseed.cue" 
c:
cls
cd darkseed
ds.bat    
exit