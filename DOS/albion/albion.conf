[midi]
mididevice = mt32


[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on

[sdl]
fullscreen=true
output=opengl

[render]
viewport = fit
integer_scaling = off


[autoexec]

mount C -t dir "~/Games/ROMs/dos/albion.conf" 
imgmount D -t cdrom "~/Games/ROMs/dos/albion.conf/game.ins" 

cls 
ECHO OFF
goto launcher

:launcher
cls 
ECHO  -------------------------------------------  
ECHO                     Albion  
ECHO  -------------------------------------------  
ECHO   1) Play        
ECHO   2) Setup                                   
ECHO  -------------------------------------------  
ECHO   3) Exit program                             
ECHO  -------------------------------------------  

choice /c123 /s Which program do you want to run? [1-3]: /n 
if errorlevel 3 goto exit
if errorlevel 2 goto setup
if errorlevel 1 goto game


:game
cls
C:
ALBILOW.BAT
goto exit


:setup
cls
C:
setup.exe
goto launcher


:exit
exit