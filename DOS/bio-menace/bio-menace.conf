[cpu]
cpu_cycles = 25000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on

[midi]
mididevice = mt32

[sdl]
fullscreen=true
output=opengl

[render]
viewport = fit
integer_scaling = off

[autoexec]

mount C -t dir"./" 
cls 
ECHO OFF
goto launcher

:launcher
cls 
ECHO  -------------------------------------------  
ECHO                  BIO MENACE
ECHO  -------------------------------------------  
ECHO   1) Play Part 1     
ECHO   2) Play Part 2
ECHO   3) PLay Part 3  
ECHO  -------------------------------------------  
ECHO   4) Exit Program                             
ECHO  -------------------------------------------  
choice /c1234 /s Which program do you want to run? [1-4]: /n 

if errorlevel 4 goto exit
if errorlevel 3 goto game3
if errorlevel 2 goto game2
if errorlevel 1 goto game


:game
cls
c:
cd bmenace
BMENACE1
goto exit


:game2
cls
c:
cd bmenace
BMENACE2
goto exit


:game3
cls
c:
cd bmenace
BMENACE3
goto exit


:exit
exit