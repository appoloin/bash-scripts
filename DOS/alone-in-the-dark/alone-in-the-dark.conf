[cpu]
cpu_cycles = 25000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on

[midi]
mididevice = mt32


[sdl]
fullresolution=desktop
windowresolution=original
fullscreen=true
output=opengl



[autoexec]
mount C  -t dir "./"
imgmount D -t cdrom "./GAME.INS" 

cls 
ECHO OFF
goto launcher

:launcher
cls 
ECHO  -------------------------------------------  
ECHO             Alone in the Dark
ECHO  -------------------------------------------  
ECHO   1) Play        
ECHO   2) Setup    
ECHO  -------------------------------------------  
ECHO   3) Exit Program                             
ECHO  -------------------------------------------  

choice /c123 /s Which program do you want to run? [1-3]: /n 
if errorlevel 3 goto exit
if errorlevel 2 goto setup
if errorlevel 1 goto game


:game
cls
c:
cd INDARK
INDARK.exe
goto exit


:setup

cls
c:
cd INDARK
install.exe
goto launcher


:exit
exit