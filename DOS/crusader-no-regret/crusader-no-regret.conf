[midi]
mididevice = mt32

[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on

[sdl]
fullscreen=true
output=opengl

[render]
viewport = fit
integer_scaling = off


[autoexec]
mount C -t dir "./" 
imgmount D -t iso -fs iso "./GAME.GOG" 

cls 
ECHO OFF
goto launcher

:launcher
cls 
ECHO  -------------------------------------------  
ECHO             Crusader: No Regret
ECHO  -------------------------------------------  
ECHO   1) Play        
ECHO   2) Setup                                 
ECHO  -------------------------------------------  
ECHO   3) Exit                              
ECHO  -------------------------------------------  
choice /c123 /s Which program do you want to run? [1-3]: /n 

if errorlevel 3 goto exit
if errorlevel 2 goto setup
if errorlevel 1 goto game


:game
cls
C:
cd crusader
REGRET.EXE
goto exit


:setup
cls
C:
cd crusader
INSTALL.EXE
goto launcher


:exit
exit