[cpu]
cpu_cycles = 50000
cpu_cycles_protected = auto
cputype = 486
cpu_throttle = on


[sdl]
fullscreen=true
output=opengl


[render]
viewport = fit
integer_scaling = off


[autoexec]
mount C  -t dir "./"
imgmount D -t cdrom "./gog.ins" 

cls 
ECHO OFF
C:
goto launcher


:launcher
cls 
ECHO  -----------------------------------------------------  
ECHO                Archimedean Dynasty
ECHO  -----------------------------------------------------  
ECHO   1) Play Game  (3dfx)
ECHO   2) Play Game  (Software render)
ECHO   3) Setup                          
ECHO  -----------------------------------------------------  
ECHO   4) Exit Program                             
ECHO  -----------------------------------------------------  
choice /c1234 /s Which program do you want to run? [1-4]: /n 
if errorlevel 4 goto exit
if errorlevel 3 goto setup
if errorlevel 2 goto soft
if errorlevel 1 goto game


:game
cls
ad3dfx.exe
goto exit


:soft
cls
ad2.exe
goto exit


:setup
cls
setsound.bat
goto launcher


:exit
exit