[sblaster]

irq=5

[mouse]

mouse_capture = onstart   

mouse_middle_release=true   

mouse_sensitivity= 15

[cpu]

cpu_cycles = 50000

cpu_cycles_protected = auto

cputype = 486

cpu_throttle = on

[autoexec]

mount C "$GAMEDIR/HDD" -t dir

imgmount D -t iso -fs iso "$GAMEDIR/drive_d/Titanic1.cue"

imgmount E -t iso -fs iso "$GAMEDIR/drive_d/Titanic2.cue"

SET PATH=%PATH%;C:\WINDOWS;

SET TEMP=C:\WINDOWS\TEMP

ECHO OFF

goto launcher

:launcher

cls 

ECHO  -------------------------------------------  

ECHO         Titanic Adveture Out of Time

ECHO  -------------------------------------------  

ECHO   1) Play        

ECHO   2) Setup                                

ECHO  -------------------------------------------  

ECHO   3) Exit                              

ECHO  -------------------------------------------  

choice /c123 /s Which program do you want to run? [1-3]: /n 

if errorlevel 3 goto exit
            
if errorlevel 2 goto setup

if errorlevel 1 goto game


:game

cls

C:

win c:\titanic\titanic

goto launcher


:setup

cls

ECHO  -------------------------------------------  

ECHO                   SETUP

ECHO  -------------------------------------------  

ECHO   1) Install Game    

ECHO   2) System

ECHO  -------------------------------------------  

ECHO   3) Main Menu                                

ECHO  -------------------------------------------  

choice /c123 /s Which program do you want to run? [1-3]: /n 


if errorlevel 3 goto launcher

if errorlevel 2 goto system

if errorlevel 1 goto GameInstall



:GameInstall

cls

C:

win D:\setup

goto setup


:system

CLS 

C:

call System.bat

goto setup


:exit

exit